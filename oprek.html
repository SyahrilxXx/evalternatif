<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Oprek Eleven</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

.link-input{
width:100%;
background:#0b0b0b;
border:1px solid rgba(255,106,0,.6);
color:#fff;
padding:15px;
border-radius:12px;
outline:none;
font-size:14px;
margin-bottom:15px;
}

.link-input::placeholder{
color:#888;
}

</style>

</head>
<body>

<div class="phone">

<header>

<a href="optest.html">
<i class="fas fa-chevron-left"></i>
</a>

<div class="logo-text">
<h1>OPREK</h1>
<span>ELEVEN</span>
</div>

<a href="alternatif.html">
<i class="fas fa-chevron-right"></i>
</a>

</header>

<div class="content">

<img src="assets/logo-eleven.png" class="main-logo">

<div class="card">

<h2 class="section-title">
LINK GAMEPLAY
</h2>

<p class="description">
Masukkan link gameplay kamu BERFORMATKAN .MP4 ATAU .MP3
</p>

<label>
LINK GAMEPLAY MP4 / MP3
</label>

<input
type="url"
id="linkFile"
class="link-input"
placeholder="https://contoh.com/video.mp4">

<label>
DESKRIPSI
</label>

<textarea
id="deskripsi"
placeholder="Masukkan deskripsi gameplay atau informasi tambahan...">
</textarea>

<button
class="btn btn-orange"
onclick="kirimGameplay()">

<i class="fab fa-whatsapp"></i>

KIRIM PERMOHONAN

</button>

</div>

<div class="card">

<h3>INFORMASI</h3>

<p class="description">

• Tempelkan link MP4 atau MP3.<br>
• Bisa menggunakan Google Drive, MediaFire, Mega, Dropbox, dll.<br>
• Isi deskripsi dengan jelas.<br>
• Data akan dikirim ke WhatsApp Admin.

</p>

</div>

</div>

<nav class="bottom-nav">

<a href="index.html">
<i class="fas fa-house"></i>
<span>HOME</span>
</a>

<a href="contact.html">
<i class="fab fa-whatsapp"></i>
<span>CONTACT</span>
</a>

<a href="optest.html">
<i class="fas fa-crosshairs"></i>
<span>OPTEST</span>
</a>

<a href="oprek.html" class="active">
<i class="fas fa-microchip"></i>
<span>OPREK</span>
</a>

<a href="alternatif.html">
<i class="fas fa-link"></i>
<span>ALT</span>
</a>

</nav>

</div>

<script>

function kirimGameplay(){

const link =
document.getElementById('linkFile').value.trim();

const deskripsi =
document.getElementById('deskripsi').value.trim();

if(link === ""){

alert("Masukkan link MP4 atau MP3 terlebih dahulu!");

return;

}

const nomor = "254794094607"; // GANTI DENGAN NOMOR ADMIN

const pesan =
`Halo Bang Syahril

Pengajuan Oprek

Link Gameplay :
${link}

Deskripsi:
${deskripsi}`;

window.open(
`https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`,
'_blank'
);

}

</script>

</body>
</html>
