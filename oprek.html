<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Oprek - Eleven Cees Club</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<div class="phone">

<header>

<a href="optest.html">
<i class="fas fa-chevron-left"></i>
</a>

<div class="logo-text">
<h1>OPREK</h1>
<span>cees club</span>
</div>

<a href="alternatif.html">
<i class="fas fa-chevron-right"></i>
</a>

</header>

<div class="content">

<img src="assets/logo-eleven.png" class="main-logo">

<div class="card">

<h2 class="section-title">
UPLOAD FILE OPREK
</h2>

<label for="videoUpload" class="upload-box">

<i class="fas fa-cloud-upload-alt"></i>

<h3>Upload File</h3>

<p>
Hanya MP4 atau MP3
</p>

</label>

<input
type="file"
id="videoUpload"
accept=".mp4,.mp3"
hidden
onchange="previewFile()">

<p id="fileName"
style="
margin-top:15px;
text-align:center;
color:#ff6a00;
font-weight:600;
">
Belum ada file dipilih
</p>

<label>
DESKRIPSI
</label>

<textarea
id="deskripsi"
placeholder="Masukkan deskripsi disini...">
</textarea>

<button
class="btn btn-orange"
onclick="kirimGameplay()">

<i class="fab fa-whatsapp"></i>

KIRIM PERMOHONAN

</button>

</div>

<div class="card">

<h3>
INFORMASI
</h3>

<p class="description">

• File yang diperbolehkan hanya MP4 dan MP3.<br>
• Isi deskripsi dengan jelas.<br>
• Nama file akan dikirim ke WhatsApp.<br>
• Ganti nomor WhatsApp pada script sesuai kebutuhan Anda.

</p>

</div>

</div>

<nav class="bottom-nav">

<a href="index.html">
<i class="fas fa-house"></i>
<span>HOME</span>
</a>

<a href="contact.html">
<i class="fab fa-whatsapp"></i>
<span>CONTACT</span>
</a>

<a href="optest.html">
<i class="fas fa-crosshairs"></i>
<span>OPTEST</span>
</a>

<a href="oprek.html" class="active">
<i class="fas fa-microchip"></i>
<span>OPREK</span>
</a>

<a href="alternatif.html">
<i class="fas fa-link"></i>
<span>ALT</span>
</a>

</nav>

</div>

<script>

function previewFile(){

const file =
document.getElementById('videoUpload').files[0];

if(!file) return;

const ext =
file.name.split('.').pop().toLowerCase();

if(ext !== "mp4" && ext !== "mp3"){

alert("Hanya file MP4 atau MP3 yang diperbolehkan!");

document.getElementById('videoUpload').value = "";

document.getElementById('fileName').innerHTML =
"Belum ada file dipilih";

return;

}

document.getElementById('fileName').innerHTML =
"File Dipilih : " + file.name;

}

function kirimGameplay(){

const file =
document.getElementById('videoUpload').files[0];

const deskripsi =
document.getElementById('deskripsi').value.trim();

if(!file){

alert("Silakan pilih file terlebih dahulu!");

return;

}

const namaFile = file.name;

/*
GANTI NOMOR INI
CONTOH:
6281234567890
*/
const nomor = "628XXXXXXXXXX";

const pesan =
`Halo Admin Eleven

Pengajuan Oprek

Nama File:
${namaFile}

Deskripsi:
${deskripsi}`;

window.open(
`https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`,
'_blank'
);

}

</script>

</body>
</html>
