<option>Zamz</option>

</select>

<script>

function kirimWhatsApp(){

const kang =
document.getElementById('kangOptest').value;

const pesan =
document.getElementById('pesan').value;

let nomor = "";

switch(kang){

case "Kall":
nomor = "6281515153449";
break;

case "Zamz":
nomor = "6289507813007";
break;

case "Hengky":
nomor = "6285764661776";
break;

case "Faris":
nomor = "6282134979303";
break;

default:
alert("Pilih Kang Optest terlebih dahulu!");
return;

}

const text =
`Halo ${kang} ada yang mau optest nih

Pesan :
${pesan}`;

window.open(
`https://wa.me/${nomor}?text=${encodeURIComponent(text)}`,
'_blank'
);

}

</script>
