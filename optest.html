<script>

function kirimWhatsApp(){

const kang =
document.getElementById('kangOptest').value;

const pesan =
document.getElementById('pesan').value;

let nomor = "";

switch(kang){

case "Kang Optest 1":
nomor = "254794094607";
break;

case "Kang Optest 2":
nomor = "6282222222222";
break;

case "Kang Optest 3":
nomor = "6283333333333";
break;

case "Kang Optest 4":
nomor = "6284444444444";
break;

case "Kang Optest 5":
nomor = "6285555555555";
break;

default:
alert("Pilih Kang Optest terlebih dahulu!");
return;

}

const text =
`Halo Kang Optest

Nama Kang : ${kang}

Pesan :
${pesan}`;

window.open(
`https://wa.me/${nomor}?text=${encodeURIComponent(text)}`,
'_blank'
);

}

</script>
